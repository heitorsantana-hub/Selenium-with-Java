<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login - Teste Selenium</title>
    <style>
        /* Estilos para deixar a página mais bonita */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #4CAF50;
            outline: none;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #45a049;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sistema de Login</h1>
        
        <!-- Formulário de login -->
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuário:</label>
                <!-- ID "username" - será usado pelo Selenium para localizar este campo -->
                <input type="text" id="username" name="username" placeholder="Digite seu usuário">
            </div>
            
            <div class="form-group">
                <label for="password">Senha:</label>
                <!-- ID "password" - será usado pelo Selenium para localizar este campo -->
                <input type="password" id="password" name="password" placeholder="Digite sua senha">
            </div>
            
            <!-- ID "loginBtn" - será usado pelo Selenium para clicar neste botão -->
            <button type="submit" id="loginBtn" class="btn">Entrar</button>
        </form>
        
        <!-- Mensagens que aparecerão após o login -->
        <!-- ID "successMessage" - Selenium pode verificar se esta mensagem aparece -->
        <div id="successMessage" class="message success hidden">
            Login realizado com sucesso! Bem-vindo!
        </div>
        
        <!-- ID "errorMessage" - Selenium pode verificar se esta mensagem aparece -->
        <div id="errorMessage" class="message error hidden">
            Usuário ou senha incorretos. Tente novamente.
        </div>
    </div>

    <script>
        // JavaScript para simular o comportamento de login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Impede o envio real do formulário
            
            // Pega os valores digitados pelo usuário
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Esconde todas as mensagens primeiro
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            
            // Simula verificação de login
            // Para fins de teste, vamos aceitar: usuário="admin" e senha="123456"
            if (username === 'admin' && password === '123456') {
                // Login correto - mostra mensagem de sucesso
                document.getElementById('successMessage').classList.remove('hidden');
            } else {
                // Login incorreto - mostra mensagem de erro
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
